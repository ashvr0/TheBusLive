name: TheBusLive
options:
  bundleIdPrefix: com.thebuslive
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_PREVIEWS: YES
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0.1"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO

targets:
  TheBusLive:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TheBusLive
        excludes:
          - "**/*.md"
          - "LiveActivity/**"
      - path: TheBusLive/LiveActivity/LiveActivityManager.swift
      - path: TheBusLive/LiveActivity/BusArrivalAttributes.swift
    resources:
      - path: TheBusLive/Assets.xcassets
    info:
      path: TheBusLive/Info.plist
      properties:
        CFBundleDisplayName: TheBus Live
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "TheBus Live uses your location to show nearby stops and center the map on your position."
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thebuslive.app
        PRODUCT_NAME: TheBus Live
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      # `embed: true` alone can produce a plain copy-files step rather
      # than a real "Embed Foundation Extensions" phase, which is what
      # ActivityKit needs to discover the extension at launch. Being
      # explicit here avoids the extension silently failing to register,
      # which surfaces at runtime as Activity.request throwing
      # .unsupportedTarget instead of a build-time error.
      - target: TheBusLiveActivity
        embed: true
        codeSignOnCopy: true

  TheBusLiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - path: TheBusLive/LiveActivity
        excludes:
          - "LiveActivityManager.swift"
          - "Info.plist"
    info:
      path: TheBusLive/LiveActivity/Info.plist
      properties:
        CFBundleDisplayName: TheBus Live Activity
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thebuslive.app.activity
        PRODUCT_NAME: TheBusLiveActivity
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "16.2"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        # Extension targets need their own generated Info.plist so
        # Xcode merges in the NSExtensionPrincipalClass / target-specific
        # keys WidgetKit expects (e.g. tying @main to the plist).
        # Leaving this unset would otherwise inherit the app target's
        # GENERATE_INFOPLIST_FILE: NO, producing an extension bundle
        # iOS can't validate as a widget host.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: TheBusLive/LiveActivity/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: TheBus Live Activity